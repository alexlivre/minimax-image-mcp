codecov:
  require_ci_to_pass: true
  notify:
    after_n_builds: 6
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...90"
  status:
    project:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

ignore:
  - "src/**/*.test.ts"
  - "src/index.ts"
  - "coverage/**"
  - "dist/**"

comment:
  layout: "header, diff, flags, components, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
